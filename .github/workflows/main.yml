name: Deploy to AWS EC2 Cluster

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server 1 (Original)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/CC_project
            git fetch --all
            git reset --hard origin/main
            npm install
            
            # Dynamically find PM2 path
            PM2_EXEC=$(which pm2 || find /home/ubuntu -name pm2 -type f -executable -print -quit 2>/dev/null || echo "pm2")
            echo "Using PM2 at: $PM2_EXEC"
            $PM2_EXEC restart all

      - name: Deploy to Server 2 (New)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST2 }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/CC_project
            git fetch --all
            git reset --hard origin/main
            npm install
            
            # Dynamically find PM2 path
            PM2_EXEC=$(which pm2 || find /home/ubuntu -name pm2 -type f -executable -print -quit 2>/dev/null || echo "pm2")
            echo "Using PM2 at: $PM2_EXEC"
            $PM2_EXEC restart all
