name: Deploy to AWS EC2 Cluster

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server 1 (Original)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/CC_project
            git fetch --all
            git reset --hard origin/main
            npm install
            pm2 restart all

      - name: Deploy to Server 2 (New)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST2 }}  # Using the new secret
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/CC_project
            git fetch --all
            git reset --hard origin/main
            npm install
            pm2 restart all
