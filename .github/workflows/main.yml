name: Deploy to EC2

on:
  push:
    branches:
      - main # Triggers the action when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to your project folder on the EC2 instance
            cd /home/ubuntu/your-project-folder-name
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Install dependencies and build (adjust as needed)
            npm install
            npm run build
            
            # 4. Restart your application (e.g., using PM2 for Node.js/Next.js apps)
            pm2 restart all